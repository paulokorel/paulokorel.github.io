<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seu Nome | Portfólio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0f0f0f;
  color: #fff;
}

header {
  text-align: center;
  padding: 100px 20px 60px;
}

h1 {
  font-size: 3rem;
  font-weight: 600;
}

header p {
  color: #aaa;
  margin-top: 10px;
}

section {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

h2 {
  margin-bottom: 20px;
  font-weight: 400;
  color: #ddd;
}

.card {
  background: #181818;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 30px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: #202020;
}

iframe {
  width: 100%;
  border-radius: 10px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.03);
}

footer {
  text-align: center;
  padding: 40px;
  color: #666;
  font-size: 14px;
}
</style>

</head>

<body>

<header>
  <h1>Seu Nome</h1>
  <p>Músico • Criador • Portfólio</p>
</header>

<section>

  <div class="card">
    <h2>🎥 Vídeos</h2>
    <iframe height="400" src="https://www.youtube.com/embed/SEU_VIDEO"></iframe>
  </div>

  <div class="card">
    <h2>🎵 Música</h2>
    <iframe height="200" src="https://w.soundcloud.com/player/?url=SEU_AUDIO"></iframe>
  </div>

  <div class="card">
    <h2>📸 Fotos</h2>
    <div class="gallery">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
    </div>
  </div>

  <div class="card">
    <h2>📩 Contato</h2>
    <p>seuemail@email.com</p>
  </div>

</section>

<footer>
  © 2026 - Seu Nome
</footer>

</body>
</html>
