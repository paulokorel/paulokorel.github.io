<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Seu Nome | Portfólio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    p {
      color: #666;
    }

    section {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    iframe {
      width: 100%;
      border-radius: 8px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>Seu Nome</h1>
  <p>Músico | Criador | Portfólio</p>
</header>

<section>
  <div class="card">
    <h2>🎥 Vídeos</h2>
    <iframe height="315" src="https://www.youtube.com/embed/SEU_VIDEO"></iframe>
  </div>

  <div class="card">
    <h2>🎵 Música</h2>
    <iframe height="166" src="https://w.soundcloud.com/player/?url=SEU_AUDIO"></iframe>
  </div>

  <div class="card">
    <h2>📸 Fotos</h2>
    <div class="gallery">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
    </div>
  </div>

  <div class="card">
    <h2>📩 Contato</h2>
    <p>Email: seuemail@email.com</p>
  </div>
</section>

<footer>
  © 2026 - Seu Nome
</footer>

</body>
</html>
